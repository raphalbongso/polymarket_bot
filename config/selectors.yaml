# Polymarket UI selectors for Selenium automation.
# Update these when the Polymarket frontend changes.
# Each element lists multiple selectors tried in order (CSS first, then XPath).

login:
  email_input:
    - "input[type='email']"
    - "input[name='email']"
    - "//input[@type='email']"
  continue_button:
    - "button[type='submit']"
    - "//button[contains(., 'Continue')]"
    - "//button[contains(., 'Log in')]"
  logged_in_indicator:
    - "a[href='/portfolio']"
    - "a[href*='/portfolio']"
    - "//a[contains(@href, '/portfolio')]"
    - "//a[contains(., 'Portfolio')]"
    - "//button[contains(., 'Deposit')]"
    - "//*[contains(., 'Balance')]"
  not_logged_in_indicator:
    - "//button[text()='Log In']"
    - "//button[text()='Sign Up']"
    - "//a[text()='Log In']"

market:
  # Buy / Sell tabs at top of trade panel
  buy_button:
    - "//button[contains(@class, 'text-heading-lg')][contains(., 'Buy')]"
    - "//*[text()='Buy'][not(contains(@class, 'trading-button'))]"
    - "//button[text()='Buy']"
    - "//p[text()='Buy']"
  sell_button:
    - "//button[contains(@class, 'text-heading-lg')][contains(., 'Sell')]"
    - "//*[text()='Sell'][not(contains(@class, 'trading-button'))]"
    - "//button[text()='Sell']"
    - "//p[text()='Sell']"
  # Market / Limit toggle
  order_type_toggle:
    - "button[aria-label='side selection']"
  # Outcome buttons (Yes/No or Up/Down depending on market type)
  yes_button:
    - "//button[contains(@class, 'trading-button')][contains(., 'Yes')]"
    - "//button[contains(@class, 'trading-button')][contains(., 'Up')]"
    - "//button[contains(., 'Up') and (contains(., '\u00a2') or contains(., '%'))]"
    - "//button[contains(., 'Yes') and (contains(., '\u00a2') or contains(., '%'))]"
  no_button:
    - "//button[contains(@class, 'trading-button')][contains(., 'No')]"
    - "//button[contains(@class, 'trading-button')][contains(., 'Down')]"
    - "//button[contains(., 'Down') and (contains(., '\u00a2') or contains(., '%'))]"
    - "//button[contains(., 'No') and (contains(., '\u00a2') or contains(., '%'))]"
  # Amount input (dollar amount, placeholder $0)
  amount_input:
    - "input[placeholder='$0']"
    - "//input[@placeholder='$0']"
  # Preset amount buttons
  amount_1:
    - "//button[contains(., '+$1')]"
  amount_5:
    - "//button[contains(., '+$5')]"
  amount_10:
    - "//button[contains(., '+$10')]"
  amount_100:
    - "//button[contains(., '+$100')]"
  amount_max:
    - "//button[contains(., 'Max')]"
  # Submit / confirm order - the big action button at bottom of trade panel
  submit_button:
    - "//button[contains(@class, 'trading-button')][contains(., 'Buy')][contains(., 'Up') or contains(., 'Down') or contains(., 'Yes') or contains(., 'No')]"
    - "//button[contains(@class, 'trading-button')][contains(., 'Sell')][contains(., 'Up') or contains(., 'Down') or contains(., 'Yes') or contains(., 'No')]"
    - "//button[contains(., 'Buy Up') or contains(., 'Buy Down') or contains(., 'Buy Yes') or contains(., 'Buy No')]"
    - "//button[contains(., 'Sell Up') or contains(., 'Sell Down') or contains(., 'Sell Yes') or contains(., 'Sell No')]"
  confirm_button:
    - "//button[contains(., 'Confirm')]"
  # Order result indicators
  order_success:
    - "//div[contains(., 'Order placed')]"
    - "//div[contains(., 'Success')]"
    - "//div[contains(., 'Filled')]"
  order_error:
    - "//div[contains(@class, 'error')]"
    - "//div[contains(., 'Failed')]"
    - "//button[contains(@class, 'trading-button')][contains(., 'Unavailable')]"
